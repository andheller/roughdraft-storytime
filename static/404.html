<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex,follow" />
		<title>404 | Roughdraft Storytime</title>
		<style>
			:root {
				--ink: #352b1f;
				--ink-soft: #6c5a43;
				--honey: #f7ad45;
				--honey-strong: #a86914;
				--tile-line: rgba(84, 72, 52, 0.06);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				color: var(--ink);
				font-family:
					"Baloo 2", "Trebuchet MS", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
					sans-serif;
				background:
					linear-gradient(var(--tile-line) 1px, transparent 1px),
					linear-gradient(90deg, var(--tile-line) 1px, transparent 1px),
					url("/optimized/paper-texture.webp"),
					linear-gradient(180deg, #fdfbf5 0%, #f7f1e7 62%, #efe4d3 100%) #f7f1e7;
				background-size:
					1.35rem 4.2rem,
					1.35rem 4.2rem,
					360px 360px,
					auto;
			}

			main {
				width: min(960px, calc(100% - 32px));
				min-height: 100vh;
				margin: 0 auto;
				padding: clamp(28px, 6vw, 72px) 0 56px;
			}

			.logo {
				display: block;
				width: min(232px, 66vw);
				margin: 0 auto clamp(16px, 4vw, 28px);
				filter: drop-shadow(0 14px 20px rgba(82, 57, 25, 0.16));
			}

			.logo img {
				display: block;
				width: 100%;
				height: auto;
			}

			.panel {
				display: grid;
				grid-template-columns: minmax(112px, 150px) minmax(0, 1fr);
				align-items: center;
				gap: clamp(18px, 4vw, 34px);
				width: min(700px, 100%);
				margin: 0 auto;
				padding: clamp(16px, 4vw, 24px);
				border: 1px solid rgba(108, 86, 52, 0.18);
				border-radius: 12px;
				background: rgba(255, 252, 245, 0.82);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.78),
					0 24px 52px rgba(92, 69, 39, 0.12);
				backdrop-filter: blur(8px);
			}

			.plaque {
				display: grid;
				place-items: center;
				aspect-ratio: 1;
				border: 1px solid rgba(112, 72, 31, 0.28);
				border-radius: 8px;
				color: #fff5d8;
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(40px, 9vw, 60px);
				font-weight: 800;
				line-height: 1;
				text-shadow: 0 2px 0 rgba(75, 42, 16, 0.34);
				background:
					linear-gradient(135deg, rgba(255, 243, 211, 0.24), transparent 34%),
					linear-gradient(180deg, rgba(159, 103, 43, 0.86), rgba(97, 54, 22, 0.92)),
					url("/optimized/shelf-wood-texture.webp");
				background-size:
					100% 100%,
					100% 100%,
					380px 150px;
				box-shadow:
					inset 0 1px 0 rgba(255, 241, 203, 0.32),
					inset 0 -8px 18px rgba(51, 24, 7, 0.28),
					0 16px 28px rgba(88, 59, 26, 0.18);
			}

			.eyebrow {
				margin: 0 0 8px;
				color: var(--honey-strong);
				font-size: 12px;
				font-weight: 900;
				letter-spacing: 0.14em;
				text-transform: uppercase;
			}

			h1 {
				margin: 0;
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(34px, 8vw, 58px);
				line-height: 0.98;
				text-wrap: balance;
			}

			p {
				max-width: 30rem;
				margin: 12px 0 0;
				color: var(--ink-soft);
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(16px, 2.5vw, 18px);
				line-height: 1.55;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin-top: 18px;
			}

			a.button {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-height: 44px;
				padding: 0 18px;
				border: 1px solid rgba(156, 100, 24, 0.32);
				border-radius: 8px;
				color: #3f2a13;
				background: linear-gradient(180deg, #ffe2a3, #ffc45f);
				box-shadow:
					inset 0 1px 0 rgba(255, 248, 223, 0.85),
					0 10px 20px rgba(150, 91, 20, 0.16);
				font-weight: 900;
				text-decoration: none;
			}

			.shelf {
				position: relative;
				width: min(540px, 100%);
				margin: clamp(28px, 7vw, 56px) auto 0;
				padding: 0 28px 30px;
			}

			.books {
				display: flex;
				align-items: flex-end;
				justify-content: center;
				gap: clamp(12px, 3vw, 22px);
			}

			.book {
				width: clamp(78px, 18vw, 112px);
				aspect-ratio: 2 / 3;
				border-radius: 7px 10px 8px 5px;
				object-fit: cover;
				box-shadow:
					0 1px 0 rgba(255, 255, 255, 0.35) inset,
					9px 0 10px rgba(53, 43, 31, 0.12),
					0 14px 18px rgba(61, 45, 24, 0.18);
			}

			.wood {
				position: absolute;
				right: 0;
				bottom: 0;
				left: 0;
				height: 24px;
				border: 1px solid rgba(97, 57, 18, 0.36);
				border-radius: 10px;
				background:
					linear-gradient(180deg, rgba(255, 231, 181, 0.44), rgba(108, 63, 20, 0.22)),
					url("/optimized/shelf-wood-texture.webp");
				background-size:
					100% 100%,
					520px 120px;
				box-shadow:
					inset 0 1px 0 rgba(255, 239, 205, 0.5),
					inset 0 -8px 10px rgba(89, 49, 14, 0.18),
					0 14px 20px rgba(75, 50, 24, 0.12);
			}

			.logo:focus-visible,
			.button:focus-visible {
				outline: 3px solid rgba(247, 173, 69, 0.45);
				outline-offset: 4px;
			}

			@media (max-width: 620px) {
				.panel {
					grid-template-columns: 1fr;
					text-align: center;
				}

				.plaque {
					width: min(132px, 44vw);
					margin: 0 auto;
				}

				.actions {
					justify-content: center;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<a class="logo" href="/" aria-label="Back to the Roughdraft library">
				<img
					src="/optimized/logo-sign-320.webp"
					srcset="/optimized/logo-sign-320.webp 320w, /optimized/logo-sign-480.webp 480w, /optimized/logo-sign-640.webp 640w, /logo-sign.webp 1536w"
					sizes="(max-width: 640px) 70vw, 232px"
					alt="Roughdraft Storytime"
					width="320"
					height="213"
				/>
			</a>

			<section class="panel" aria-labelledby="page-title">
				<div class="plaque" aria-hidden="true">404</div>
				<div>
					<p class="eyebrow">Roughdraft Storytime</p>
					<h1 id="page-title">This shelf is empty</h1>
					<p>That page is not in the catalog yet. The main shelf is still ready.</p>
					<div class="actions">
						<a class="button" href="/">Browse stories</a>
					</div>
				</div>
			</section>

			<section class="shelf" aria-label="Suggested stories">
				<div class="books" aria-hidden="true">
					<img class="book" src="/covers/silly-squirrels.jpg" alt="" loading="lazy" decoding="async" />
					<img
						class="book"
						src="/covers/dust-calloway-and-the-sky-coach-robbers/dust-calloway-and-the-sky-coach-robbers.png"
						alt=""
						loading="lazy"
						decoding="async"
					/>
					<img
						class="book"
						src="/covers/field-day-fiasco/field-day-fiasco.png"
						alt=""
						loading="lazy"
						decoding="async"
					/>
				</div>
				<div class="wood" aria-hidden="true"></div>
			</section>
		</main>
	</body>
</html>
