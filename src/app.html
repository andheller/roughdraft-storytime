<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Prevent theme flash by bootstrapping the same theme settings used by themeState.
			(function () {
				const root = document.documentElement;
				const defaults = {
					appearance: 'system',
					font: 'serif'
				};
				const validAppearance = new Set(['system', 'light', 'dark']);
				const validFont = new Set(['serif', 'sans']);

				try {
					const saved = localStorage.getItem('theme-settings');
					const parsed = saved ? JSON.parse(saved) : {};
					const settings = {
						appearance: validAppearance.has(parsed.appearance)
							? parsed.appearance
							: defaults.appearance,
						font: validFont.has(parsed.font) ? parsed.font : defaults.font
					};
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const isDark =
						settings.appearance === 'dark' || (settings.appearance === 'system' && prefersDark);

					root.classList.toggle('dark', isDark);
					root.classList.toggle('font-serif', settings.font === 'serif');
					root.classList.toggle('font-sans', settings.font === 'sans');
				} catch (_) {
					root.classList.add('font-serif');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
