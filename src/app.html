<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Prevent theme flash by bootstrapping the same theme settings used by themeState.
			(function () {
				const root = document.documentElement;
				const darkPalettes = new Set(['night', 'midnight']);
				const validPalettes = new Set(['paper', 'daylight', 'dusk', 'night', 'midnight']);
				const validFont = new Set(['serif', 'sans']);

				try {
					const saved = localStorage.getItem('theme-settings');
					const parsed = saved ? JSON.parse(saved) : {};

					// Migrate old appearance setting
					let palette = parsed.palette;
					if (!palette && parsed.appearance) {
						palette = parsed.appearance === 'dark' ? 'midnight' : 'daylight';
					}
					palette = validPalettes.has(palette) ? palette : 'daylight';
					const font = validFont.has(parsed.font) ? parsed.font : 'serif';

					root.classList.toggle('dark', darkPalettes.has(palette));
					root.setAttribute('data-palette', palette);
					root.classList.toggle('font-serif', font === 'serif');
					root.classList.toggle('font-sans', font === 'sans');
				} catch (_) {
					root.setAttribute('data-palette', 'daylight');
					root.classList.add('font-serif');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
